var _booted=false;
function _b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0)});}
async function _deriveKey(pw){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:_b64(ENC.salt),iterations:ENC.iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function _unlock(pw){
  if(_booted) return;
  var key=await _deriveKey(pw);
  var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:_b64(ENC.iv)},key,_b64(ENC.ct));
  var htmlStr=new TextDecoder().decode(pt);
  _booted=true;
  document.getElementById('lock').style.display='none';
  var app=document.getElementById('app');
  app.innerHTML=htmlStr;
  var scripts=app.querySelectorAll('script');
  scripts.forEach(function(old){
    var s=document.createElement('script');
    s.textContent=old.textContent;
    document.body.appendChild(s);
  });
  try{localStorage.setItem('pinsu_pw',pw);}catch(e){}
}
async function tryUnlock(){
  var pw=document.getElementById('pw').value;
  var msg=document.getElementById('lkmsg');
  msg.textContent='解锁中…';
  try{ await _unlock(pw); }
  catch(e){ msg.textContent='密码不对，再试一次'; try{localStorage.removeItem('pinsu_pw');}catch(_){} }
}
document.addEventListener('keydown',function(e){ if(e.key==='Enter'){var l=document.getElementById('lock'); if(l&&l.style.display!=='none') tryUnlock();} });
